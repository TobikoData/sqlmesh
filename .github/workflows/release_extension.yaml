name: Release VSCode Extension
on:
  push:
    tags:
      - 'vscode@v*'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Extract version from tag
        id: extract_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/vscode@v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Update package.json version
        working-directory: vscode/extension
        run: |
          npm version ${{ steps.extract_version.outputs.VERSION }} --no-git-tag-version
      - name: Build extension
        working-directory: vscode/extension
        run: pnpm run compile
      - name: Package extension
        working-directory: vscode/extension
        run: |
          pnpm run vscode:package
          # Rename the output file to include the version
          mv *.vsix sqlmesh-${{ steps.extract_version.outputs.VERSION }}.vsix
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: VSCode Extension v${{ steps.extract_version.outputs.VERSION }}
          body: |
            ## SQLMesh VSCode Extension v${{ steps.extract_version.outputs.VERSION }}
          draft: false
          prerelease: false
      - name: Upload Extension to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: vscode/extension/sqlmesh-${{ steps.extract_version.outputs.VERSION }}.vsix
          asset_name: sqlmesh-${{ steps.extract_version.outputs.VERSION }}.vsix
          asset_content_type: application/octet-stream