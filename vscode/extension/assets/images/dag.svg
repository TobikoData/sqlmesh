<svg 
    width="100" 
    height="100" 
    viewBox="0 0 100 100" 
    fill="none" 
    xmlns="http://www.w3.org/2000/svg"
>
  <!-- Top-left circle -->
  <circle cx="20" cy="20" r="8" fill="black" />
  
  <!-- Bottom-left circle -->
  <circle cx="20" cy="80" r="8" fill="black" />
  
  <!-- Right circle -->
  <circle cx="80" cy="20" r="8" fill="black" />
  
  <!-- Vertical line from top-left circle to bottom-left circle -->
  <path 
    d="M20 28 V72" 
    stroke="black" 
    stroke-width="4" 
    stroke-linecap="round"
  />
  
  <!-- Curved line from top-left circle to right circle -->
  <path 
    d="M20 20 
       C 35 35, 65 5, 80 20" 
    stroke="black" 
    stroke-width="4" 
    fill="none" 
    stroke-linecap="round"
  />
</svg>