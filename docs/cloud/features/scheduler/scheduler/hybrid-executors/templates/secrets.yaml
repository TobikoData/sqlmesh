apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hybrid-executors.fullname" . }}-secrets
  labels:
    {{- include "hybrid-executors.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.tcloudClientSecret }}
  TCLOUD_CLIENT_SECRET: {{ .Values.secrets.tcloudClientSecret | b64enc | quote }}
  {{- end }}
  
  {{- range $gatewayName, $gateway := .Values.global.sqlmesh.gateways }}
    {{- range $paramName, $paramValue := $gateway.connection }}
      {{- $isSecret := include "hybrid-executors.isSecretParam" $paramName }}
      
      {{- /* Override based on secretParams if specified */}}
      {{- if $.Values.global.sqlmesh.secretParams }}
        {{- range $.Values.global.sqlmesh.secretParams }}
          {{- if eq . $paramName }}
            {{- $isSecret = "true" }}
          {{- end }}
        {{- end }}
      {{- end }}
      
      {{- /* Override based on nonSecretParams if specified */}}
      {{- if $.Values.global.sqlmesh.nonSecretParams }}
        {{- range $.Values.global.sqlmesh.nonSecretParams }}
          {{- if eq . $paramName }}
            {{- $isSecret = "false" }}
          {{- end }}
        {{- end }}
      {{- end }}
      
      {{- if and (eq $isSecret "true") $paramValue }}
  {{ printf "SQLMESH__GATEWAYS__%s__CONNECTION__%s" $gatewayName (upper $paramName) }}: {{ $paramValue | b64enc | quote }}
      {{- end }}
    {{- end }}
  {{- end }}
  
  {{- if .Values.secrets.data }}
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }} 